name: Generar inicio diario

on:
  schedule:
    - cron: '5 0 * * *'
      timezone: 'America/Argentina/Buenos_Aires'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generar-inicio-diario
  cancel-in-progress: false

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Generar datos de Inicio
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npm run generar-inicio

      - name: Publicar archivo actualizado
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add datos/inicio.json
          if git diff --cached --quiet; then
            echo "El archivo diario ya estaba actualizado."
            exit 0
          fi
          git commit -m "chore: actualizar inicio diario"
          git push
